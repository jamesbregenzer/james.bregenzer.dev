<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#050806">
  <meta name="description" content="James Bregenzer's observatory: projects, signals, activity, notes, and unfinished experiments.">
  <title>james.bregenzer.dev — the observatory</title>
  <link rel="icon" href="/assets/favicon.png" type="image/svg+xml">
  <link rel="stylesheet" href="/assets/styles.css?v=jb">
  <script src="/assets/script.js?v=jb" defer></script>
  <script src="/assets/navigation.js?v=jb" defer></script>
</head>
<body class="home">
  <a class="skip-link" href="#main">skip to observatory</a>

  <main id="main">
    <section class="observatory-scene" aria-label="The dome observatory">
      <img class="room-layer" src="/assets/img/room-background-phase5.webp" alt="An empty, ancient dome observatory overlooking a storm-dark city at night.">
      <div class="window-weather" aria-hidden="true">
        <i class="cloud cloud-one"></i>
        <i class="cloud cloud-two"></i>
        <i class="distant-signal"></i>
        <i class="distant-lightning"></i>
      </div>
      <header class="observatory-id">
        <a href="/">james.bregenzer.dev</a>
      </header>

      <nav class="scene-navigation" aria-label="Objects in the observatory">
        <a class="scene-object telescope" href="/observations/" data-object="telescope" aria-label="Observations — Watch the signals">
          <img src="/assets/img/telescope-phase32.png" alt="">
          <span class="object-label"><b>observations</b><small>Watch the signals</small></span>
        </a>
        <a class="scene-object workbench" href="/projects/" data-object="workbench" aria-label="Projects — See what I'm building">
          <img src="/assets/img/workstation-proof-v2.png" alt="">
          <span class="object-label"><b>projects</b><small>See what I'm building</small></span>
        </a>
        <a class="scene-object terminal-link" href="/logbook/" data-object="terminal" aria-label="Logbook — Recent activity">
          <span class="object-label"><b>logbook</b><small>Recent activity</small></span>
        </a>
        <a class="scene-object archive" href="/archive/" data-object="archive" aria-label="Archive — Notes and history">
          <img src="/assets/img/archive-phase32.png" alt="">
          <span class="object-label"><b>archive</b><small>Notes &amp; history</small></span>
        </a>
        <a class="scene-object door" href="/experiments/" data-object="door" aria-label="Experiments — Unfinished things">
          <img src="/assets/img/door-phase32.png" alt="">
          <span class="object-label"><b>experiments</b><small>Unfinished things</small></span>
        </a>
      </nav>

      <div class="keeper" aria-label="The ancient Keeper watches over the observatory">
        <div class="smoke-plumes" aria-hidden="true">
          <i class="smoke-plume plume-one"></i>
          <i class="smoke-plume plume-two"></i>
          <i class="smoke-plume plume-three"></i>
        </div>
        <img class="keeper-core" src="/assets/img/keeper-standing-phase5.webp" alt="">
      </div>
    </section>
  </main>
</body>
</html>
